.proses-lampu {
    background: #00f2ff !important;
    box-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff;
    animation: neon-flash 0.3s infinite alternate;
    border: none;
    color: white;
}
@keyframes neon-flash {
    from { opacity: 0.8; filter: brightness(1.2); }
    to { opacity: 1; filter: brightness(1.5); }
}
</style>

<script>
function doLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const btn = document.getElementById('btn-masuk');
    const err = document.getElementById('err');

    if (u === "" || p === "") {
        err.innerHTML = "Isi Username & Password dulu Bos!";
        return;
    }

    // 1. EFEK LAMPU & TEKS MEMPROSES
    btn.innerHTML = "MEMPROSES...";
    btn.classList.add('proses-lampu');
    btn.disabled = true;

    // 2. MASUK INSTAN (Jeda 0.4 detik saja buat visual)
    setTimeout(() => {
        // Logika pindah halaman Bos
        document.getElementById('login-page').style.display = 'none';
        if(document.getElementById('main-dashboard')) {
            document.getElementById('main-dashboard').style.display = 'flex';
        }

        // Balikin tombol ke normal (biar pas logout nggak macet)
        btn.innerHTML = "MASUK KE SISTEM";
        btn.classList.remove('proses-lampu');
        btn.disabled = false;
    }, 400);
}
</script>

async function doLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const errDisplay = document.getElementById('err');
    
    // 1. AMBIL DATABASE USER
    let db = JSON.parse(localStorage.getItem('db_users') || "[]");
    
    // 2. CEK LOGIN KHUSUS ADMIN (GANA)
    if(u.toLowerCase() === "gana" && p === "1234") {
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('currentUser', 'GANA'); // Simpan siapa yang login
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        showWelcome();
        
        // Munculkan menu Add User khusus Gana
        const menuAdmin = document.getElementById('menu-add-user');
        if(menuAdmin) menuAdmin.style.display = 'block';
        return;
    }

    // 3. CARI USER DI DATABASE (Rani, Raymon, dll)
    // Pakai .find agar dia mencari ke seluruh daftar, bukan cuma baris pertama
    let userKetemu = db.find(item => item.user === u && item.pass === p);

    if (userKetemu) {
        // --- PROSES CEK IP OTOMATIS ---
        let ipSekarang = "";
        try {
            const resp = await fetch('https://api.ipify.org?format=json');
            const data = await resp.json();
            ipSekarang = data.ip;
        } catch (e) { console.log("Gagal deteksi IP"); }

        // VALIDASI IP
        if (userKetemu.ip !== ipSekarang) {
            errDisplay.innerText = "MAAF, IP ANDA TIDAK TERDAFTAR!";
            errDisplay.style.color = "red";
            return;
        }

        // JIKA SEMUA OK, MASUK KE DASHBOARD
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('currentUser', u); // Simpan nama user
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        showWelcome();
        
        // Sembunyikan menu Add User (Biar user biasa gak bisa daftar orang lain)
        const menuAdmin = document.getElementById('menu-add-user');
        if(menuAdmin) menuAdmin.style.display = 'none';
        
    } else {
        // JIKA TIDAK ADA DI DATABASE
        errDisplay.innerText = "USERNAME/PASSWORD SALAH!";
        errDisplay.style.color = "red";
    }
}

    function hitungToto() {
        // Ambil input dinamis dari dashboard Bos
        const d6 = parseInt(document.getElementById('b1').value) || 0; 
        const e6 = parseInt(document.getElementById('b2').value) || 0; 
        const f6 = parseInt(document.getElementById('b3').value) || 0; 
        const g6 = parseInt(document.getElementById('b4').value) || 0; 
        const h6 = parseInt(document.getElementById('b5').value) || 0; 
        const i6 = parseInt(document.getElementById('b6').value) || 0; 
        const j6 = parseInt(document.getElementById('addNum').value) || 0; 

        // --- PROSES RUMUS SESUAI DOKUMEN EXCEL BOS ---
        
        // G6+H6 (Bola 4 + Bola 5) -> Untuk Result Digit 2
        const resE8 = (g6 + h6).toString(); 
        
        // E6+F6 (Bola 2 + Bola 3) -> Untuk Result Digit 1
        const resD8 = (e6 + f6).toString(); 

        // SUM(D6:I6)*2 (Total semua bola * 2)
        const sumSemua = d6 + e6 + f6 + g6 + h6 + i6;
        const resG8 = (sumSemua * 2).toString();

        // G8-D6-I6+J6 (Hasil G8 - Bola 1 - Bola 6 + Add)
        const resH8 = ( (sumSemua * 2) - d6 - i6 + j6 ).toString();

        // --- PENGAMBILAN KARAKTER (LOGIKA MID EXCEL BOS) ---
        
        // Angka 1: Karakter ke-2 dari hasil E6+F6
        const digit1 = resD8.charAt(resD8.length - 1) || "0";

        // Angka 2: Karakter ke-2 dari hasil G6+H6
        const digit2 = resE8.charAt(resE8.length - 1) || "0";

        // Angka 3: Karakter ke-2 dari hasil H8 (Sesuai kolom Result ke-3 di Excel)
        const digit3 = resH8.charAt(1) || "0";

        // Angka 4: Karakter ke-3 (paling belakang) dari hasil H8
        const digit4 = resH8.charAt(resH8.length - 1) || "0";

        // HASIL AKHIR GABUNGAN 4D
        const hasil4D = digit1 + digit2 + digit3 + digit4;
        
        // Tampilkan di dashboard
        document.getElementById('finalRes').innerText = hasil4D;
    }

const drawImgNoBg = (url, targetX, targetY, targetW, targetH) => {
return new Promise((resolve) => {
const img = new Image();
img.crossOrigin = "anonymous";
img.src = url;
img.onload = () => {
const tempCanvas = document.createElement('canvas');
const tempCtx = tempCanvas.getContext('2d');
tempCanvas.width = img.width;
tempCanvas.height = img.height;
tempCtx.drawImage(img, 0, 0);

const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
const data = imgData.data;
for (let i = 0; i < data.length; i += 4) {
if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) {
data[i+3] = 0;
}
}
tempCtx.putImageData(imgData, 0, 0);

const padding = 15;
const innerW = targetW - (padding * 2);
const innerH = targetH - (padding * 2);

const scale = Math.min(innerW / img.width, innerH / img.height);
const drawW = img.width * scale;
const drawH = img.height * scale;

const drawX = targetX + (targetW - drawW) / 2;
const drawY = targetY + (targetH - drawH) / 2;

ctx.drawImage(tempCanvas, drawX, drawY, drawW, drawH);
resolve();
};
img.onerror = () => resolve();
});
};

function initPasteSistem() {
    const setup = (id, imgId, key) => {
        const el = document.getElementById(id); if(!el) return;
        el.addEventListener('paste', (e) => {
            const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
            if (item) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById(imgId).src = ev.target.result;
                    document.getElementById(imgId).style.display = 'block';
                    window['dataJP_' + key] = ev.target.result;
                    el.style.borderColor = "#4caf50";
                };
                reader.readAsDataURL(item.getAsFile());
            }
        });
    };
    setup('box-bg', 'v-bg', 'bg'); 
    setup('box-bukti', 'v-bukti', 'bukti');
    setup('box-bukti2', 'v-bukti2', 'bukti2');
}

async function prosesRakitHP() {
    if (!window.dataJP_bg || !window.dataJP_bukti) return alert("Background dan Bukti 1 wajib diisi!");

    const canvas = document.getElementById('canvasJP');
    const ctx = canvas.getContext('2d');
    canvas.width = 1600; canvas.height = 900;
    
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const loadImg = (src) => new Promise((res) => {
        if (!src) return res(null);
        const img = new Image(); img.crossOrigin = "anonymous";
        img.onload = () => res(img); img.onerror = () => res(null);
        img.src = src;
    });

    try {
        const [imgBg, imgBukti, imgBukti2, imgLogo, imgG] = await Promise.all([
            loadImg(window.dataJP_bg),
            loadImg(window.dataJP_bukti),
            window.dataJP_bukti2 ? loadImg(window.dataJP_bukti2) : Promise.resolve(null),
            loadImg('https://lh3.googleusercontent.com/u/0/d/11TGE6OTIhq_pR5cb7ZPfwQGnrbQrhClD'), 
            loadImg('https://lh3.googleusercontent.com/d/10J0y73M4RqZi3hhgrGJum7qxt3cGN9J2') 
        ]);

        if (imgBg) ctx.drawImage(imgBg, 0, 0, 1600, 900);

        // 1. RENDER LOGO DANATOTO
        if (imgLogo) {
            const lW = 210; const lH = 85;  
            const lX = (1600 / 2) - (lW / 2); 
            ctx.drawImage(imgLogo, lX, -22, lW, lH);
        }
      
        // 2. DAFTAR SEKARANG & GOOGLE BOX
        const rX = 1300; const rY = 20;
        ctx.save();
        let grad = ctx.createLinearGradient(rX, rY, rX + 280, rY + 45);
        grad.addColorStop(0, '#FFD700'); grad.addColorStop(1, '#B8860B'); 
        ctx.fillStyle = grad;
        drawRoundedJP(ctx, rX, rY, 280, 45, 10); ctx.fill();
        ctx.fillStyle = "#000"; ctx.font = "bold 22px Arial"; ctx.textAlign = "center";
        ctx.fillText("DAFTAR SEKARANG", rX + 140, rY + 30);
        drawRoundedJP(ctx, rX + 10, rY + 55, 260, 35, 18);
        ctx.fillStyle = "rgba(255, 255, 255, 0.95)"; ctx.fill();
        
        if (imgG) ctx.drawImage(imgG, rX + 25, rY + 63, 18, 18);
        
        ctx.fillStyle = "#555"; ctx.font = "italic 16px Arial"; ctx.textAlign = "left";
        ctx.fillText("🔍 DANATOTO", rX + 48, rY + 78);
        ctx.restore();

        // 3. RENDER HP (LOGIKA SMART DETECT: FULL vs PROPORTIONAL)
        const hp = { w: 340, h: 640, r: 50, b: 12, y: 130 };
        const renderHP = (x, img) => {
            if (!img) return;
            ctx.save();
            ctx.shadowBlur = 30; ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.fillStyle = "#111"; 
            drawRoundedJP(ctx, x, hp.y, hp.w, hp.h, hp.r); ctx.fill();
            ctx.restore();

            ctx.save();
            const innerW = hp.w - (hp.b * 2);
            const innerH = hp.h - (hp.b * 2);
            const innerX = x + hp.b;
            const innerY = hp.y + hp.b;
            drawRoundedJP(ctx, innerX, innerY, innerW, innerH, hp.r - 10);
            ctx.clip();
            
            ctx.fillStyle = "#FFFFFF"; 
            ctx.fillRect(innerX, innerY, innerW, innerH);

            // --- LOGIKA SMART DETECT ---
            const imgRatio = img.width / img.height;
            // Jika gambar potret/normal (Rasio < 0.8), hajar FULL biar rapi
            if (imgRatio < 0.8) { 
                ctx.drawImage(img, innerX, innerY, innerW, innerH);
            } 
            // Jika gambar lebar/petak, gunakan skala biar gak lonjong (Peang)
            else {
                const scale = Math.min(innerW / img.width, innerH / img.height);
                const newW = img.width * scale;
                const newH = img.height * scale;
                const offX = innerX + (innerW - newW) / 2;
                const offY = innerY + (innerH - newH) / 2;
                ctx.drawImage(img, offX, offY, newW, newH);
            }
            ctx.restore();

            ctx.fillStyle = "#000"; ctx.beginPath();
            ctx.arc(x + (hp.w/2), hp.y + 30, 8, 0, Math.PI * 2); ctx.fill();
        };

        renderHP(30, imgBukti); 
        if (imgBukti2) renderHP(1600 - hp.w - 30, imgBukti2);

        localStorage.setItem('last_jp_result', canvas.toDataURL('image/png', 1.0));
        document.getElementById('mesin-input-jp').style.display = 'none';
        document.getElementById('hasil-rakitan').style.display = 'block';

    } catch (e) { console.error(e); }
}

function downloadHasilJP() {
    const canvas = document.getElementById('canvasJP');
    if (!canvas) return;
    canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = 'KEMENANGAN_DANATOTO.png';
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);
    }, 'image/png');
}

function drawRoundedJP(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

function hapusHasilJP() {
    if (confirm("Reset ulang?")) {
        localStorage.removeItem('last_jp_result');
        window.dataJP_bg = null; window.dataJP_bukti = null; window.dataJP_bukti2 = null;
        loadKemenangan();
    }
}

// 2. FUNGSI SIMPAN DATA USER
function simpanUserBaru() {
    const user = document.getElementById('new-user').value;
    const pass = document.getElementById('new-pass').value;
    const ip = document.getElementById('new-ip').value;

    if(!user || !pass || !ip) return alert("Waduh Bos, isi semua dulu datanya!");

    let db = JSON.parse(localStorage.getItem('db_users') || "[]");
    db.push({ user, pass, ip });
    localStorage.setItem('db_users', JSON.stringify(db));
    
    alert("User " + user + " Berhasil Didaftarkan!");
    
    document.getElementById('new-user').value = "";
    document.getElementById('new-pass').value = "";
    document.getElementById('new-ip').value = "";
    
    updateUserTable();
}

// 3. FUNGSI UPDATE TABEL USER
function updateUserTable() {
    const area = document.getElementById('tabel-user-area');
    if (!area) return;
    
    let db = JSON.parse(localStorage.getItem('db_users') || "[]");
    
    if (db.length === 0) {
        area.innerHTML = "<p style='color: #888;'>Belum ada user yang terdaftar.</p>";
        return;
    }

    let html = `
        <h3 style="color: #00f2ff;">📋 DAFTAR USER AKTIF</h3>
        <table style="width: 100%; background: #111; border-radius: 10px; border-collapse: collapse; border: 1px solid #333;">

                <th style="padding: 12px; text-align: left;">IP Terdaftar</th>
                <th style="padding: 12px; text-align: center;">Aksi</th>
            </tr>`;
            
    db.forEach((u, i) => {
        html += `
            <tr style="border-bottom: 1px solid #222;">
                <td style="padding: 12px;">${u.user}</td>
                <td style="padding: 12px; color: #00f2ff; font-family: monospace;">${u.ip}</td>
                <td style="padding: 12px; text-align: center;">
                    <button onclick="resetPass(${i})" style="background: orange; color: black; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;">Reset</button>

    });

}

function resetPass(i) {
    let db = JSON.parse(localStorage.getItem('db_users'));
    let pBaru = prompt("Masukkan Password Baru untuk " + db[i].user + " :");
    if(pBaru) { 
        db[i].pass = pBaru; 
        localStorage.setItem('db_users', JSON.stringify(db)); 
        alert("Password berhasil diupdate Bos!"); 
    }
}

// 5. FUNGSI HAPUS USER
function hapusUser(i) {
    if(confirm("Yakin mau hapus user ini? Dia gak bakal bisa login lagi loh.")) {
        let db = JSON.parse(localStorage.getItem('db_users'));
        db.splice(i, 1); 
        localStorage.setItem('db_users', JSON.stringify(db));
        updateUserTable();
    }
}
