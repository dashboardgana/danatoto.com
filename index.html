<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP DANATOTO SYSTEM - FULL EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: none; margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; background-color: #05070a; color: #fff; }
        * { box-sizing: border-box; }
        
        /* LOGIN PAGE */
        #login-page {
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            background: #000 url('https://lh3.googleusercontent.com/d/14C_qsiLDmnxIZXXu4yPvqeuLOy-ac5HA') no-repeat center center;
            background-size: cover; position: fixed; width: 100%; z-index: 9999;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); padding: 40px; 
            border-radius: 20px; border: 1px solid #00d4ff; width: 90%; max-width: 400px; 
            text-align: center; color: white; box-shadow: 0 0 30px #00d4ff55;
        }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
        .login-card button { width: 100%; padding: 12px; margin-top: 20px; background: #00d4ff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }

        /* DASHBOARD & SIDEBAR */
        #main-dashboard { display: none; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #1a237e; height: 100vh; position: fixed; padding: 20px; overflow-y: auto; z-index: 100; }
        .sidebar h2 { color: #00d4ff; font-size: 20px; margin-bottom: 30px; text-align: center; border-bottom: 2px solid #00d4ff; padding-bottom: 10px; }
        .menu-item { display: block; color: #aaa; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .menu-item:hover { color: #fff; background: #1a237e; }
        .active-menu { background: #00d4ff !important; color: #000 !important; font-weight: bold; }

        .content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); min-height: 100vh; }
        .header-box { width: 100%; background: #0d1117; padding: 25px; border-radius: 15px; border: 1px solid #00d4ff; margin-bottom: 30px; text-align: center; position: relative; box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .running-text { color: #00d4ff; font-size: 20px; font-weight: bold; }
        .date-display { font-size: 26px; font-weight: bold; text-shadow: 0 0 10px #00d4ff; color: #fff; }

        /* GRID PREDIKSI */
        #main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; transition: 0.3s; }
        .card-header { background: linear-gradient(90deg, #00d4ff, #008fb3); padding: 10px; font-weight: bold; color: #000; text-align: center; text-transform: uppercase; font-size: 13px; }
        .card-body { padding: 15px; font-size: 13px; color: #f0f6fc; }
        .row-data { display: flex; justify-content: space-between; border-bottom: 1px solid #21262d; padding: 6px 0; }
        .val-bbfs { color: #ffeb3b; font-size: 15px; font-weight: bold; }
        .btn-copy { width: 100%; padding: 10px; margin-top: 10px; background: #30363d; border: 1px solid #00d4ff; border-radius: 6px; color: #00d4ff; cursor: pointer; font-weight: bold; }

        /* JADWAL BANK */
        .bank-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .bank-card { background: #000b1a; border-radius: 15px; padding: 15px; border: 2px solid #00d4ff; width: 220px; text-align: center; }
        .logo-wrapper { width: 100%; height: 60px; background: #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; padding: 5px; }
        .bank-logo { max-width: 90%; max-height: 90%; object-fit: contain; }
        .status-online { color: #00ff88; font-weight: bold; font-size: 14px; }

        /* KALKULATOR TOTO */
        .toto-container { max-width: 500px; margin: 0 auto; background: #161b22; border: 1px solid #00d4ff; padding: 25px; border-radius: 15px; }
        .toto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .toto-grid input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; text-align: center; font-size: 18px; border-radius: 5px; }
        .btn-hitung { width: 100%; padding: 15px; background: #00d4ff; color: #000; font-weight: bold; margin-top: 15px; border: none; border-radius: 8px; cursor: pointer; }

        /* SYAIR GENERATOR */
        #canvasSyair { width: 100%; max-width: 600px; border: 3px solid #00d4ff; border-radius: 10px; margin-bottom: 15px; }

        @media (max-width: 768px) { .sidebar { display: none; } .content { margin-left: 0; width: 100%; } .bank-card { width: 45%; } }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x" style="color: #00d4ff; margin-bottom: 15px;"></i>
        <h2>VIP DANATOTO</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()">MASUK SISTEM</button>
    </div>
</div>

<div id="main-dashboard">
    <div class="sidebar">
        <h2>DANATOTO</h2>
        <div onclick="showWelcome()" class="menu-item active-menu" id="m-dash"><i class="fas fa-home"></i> DASHBOARD</div>
        <div onclick="loadAllPasaran()" class="menu-item" id="m-pred"><i class="fas fa-fire"></i> PREDIKSI TOGEL</div>
        <div onclick="loadJadwalBank()" class="menu-item" id="m-bank"><i class="fas fa-university"></i> JADWAL BANK</div>
        <div onclick="loadSgpToto()" class="menu-item" id="m-sgp"><i class="fas fa-calculator"></i> SGP TOTO</div>
        <div onclick="loadSyairGenerator()" class="menu-item" id="m-syair"><i class="fas fa-book-open"></i> SYAIR HARIAN</div>
        <div onclick="doLogout()" class="menu-item" style="color:#ff5252; margin-top:50px;"><i class="fas fa-power-off"></i> LOGOUT</div>
    </div>

    <div class="content">
        <div class="header-box">
            <marquee class="running-text" id="run-txt">SELAMAT DATANG DI VIP SYSTEM DANATOTO - SEMOGA JP PAUS! ✨</marquee>
            <div id="display-tgl" class="date-display" style="display:none;"></div>
        </div>
        <div id="main-grid"></div>
    </div>
</div>

<script>
    // 1. DATA LENGKAP PASARAN (50+ PASARAN BOSKU)
    const daftarPasaran = ["HOKI DRAW", "TOTO MACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "BANGKOK 0130", "NEWYORK MIDDAY", "CAROLINA DAY", "BRUNEI 02", "OREGON 03", "OREGON 06", "CALIFORNIA", "FLORIDA EVENING", "OREGON 09", "BANGKOK 0930", "NEWYORK EVENING", "KENTUCKY EVENING", "CAROLINA EVENING", "TOTOCAMBODIA", "CHELSEA 11", "OREGON 12", "POIPET12", "BULLSEYE", "TOTOMACAU SIANG", "SYDNEY", "JAKARTA 1400", "BRUNEI 14", "CHELSEA 15", "TOTOMALI 1530", "TOTOMACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630", "KING KONG 4D I", "SINGAPORE", "MAGNUM4D", "TOTOMACAU MALAM I", "CHELSEA 19", "POIPET19", "PCSO", "TOTOMALI 2030", "HUAHIN 2100", "CHELSEA 21", "TOTOMACAU 5D MALAM", "NEVADA", "BRUNEI 21", "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "TOTOMACAU MALAM III", "TOTOMALI 2330", "JAKARTA 2330", "KING KONG 4D II"];
    
    // 2. DATA LENGKAP BANK & LOGO
    const daftarBank = [
        { name: "BCA", logo: "https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg", schedule: "Online 24 Jam" },
        { name: "BNI", logo: "https://upload.wikimedia.org/wikipedia/id/5/55/BNI_logo.svg", schedule: "Online 24 Jam" },
        { name: "BRI", logo: "https://upload.wikimedia.org/wikipedia/commons/2/2e/BRI_Logo.svg", schedule: "Online 24 Jam" },
        { name: "MANDIRI", logo: "https://upload.wikimedia.org/wikipedia/commons/a/ad/Bank_Mandiri_logo_2016.svg", schedule: "Online 24 Jam" },
        { name: "DANA", logo: "https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg", schedule: "E-Wallet Online" },
        { name: "OVO", logo: "https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo_ovo_purple.svg", schedule: "E-Wallet Online" },
        { name: "GOPAY", logo: "https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg", schedule: "E-Wallet Online" },
        { name: "QRIS", logo: "https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg", schedule: "Auto Process" }
    ];

    const dataShio = ["ULAR", "BABI", "KELINCI", "KERBAU", "HARIMAU", "AYAM", "ANJING", "MONYET", "NAGA", "TIKUS", "KAMBING", "KUDA"];

    // FUNGSI UTAMA
    function doLogin() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "1234") {
            sessionStorage.setItem('isLoggedIn', 'true');
            location.reload();
        } else { alert("Login Gagal!"); }
    }
    function doLogout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }

    function resetActive() {
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active-menu'));
        document.getElementById('main-grid').innerHTML = "";
        document.getElementById('display-tgl').style.display = "none";
        document.getElementById('run-txt').style.display = "block";
    }

    function showWelcome() {
        resetActive();
        document.getElementById('m-dash').classList.add('active-menu');
        document.getElementById('main-grid').innerHTML = '<div style="width:100%; text-align:center; padding:50px;"><h3>SILAHKAN PILIH MENU DI SAMPING</h3></div>';
    }

    // 3. FITUR PREDIKSI (SEMUA PASARAN & BISA COPY)
    function loadAllPasaran() {
        resetActive();
        document.getElementById('m-pred').classList.add('active-menu');
        document.getElementById('display-tgl').style.display = "block";
        const tgl = new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        document.getElementById('display-tgl').innerText = tgl;
        
        const grid = document.getElementById('main-grid');
        daftarPasaran.forEach((p, i) => {
            const bbfs = Math.floor(Math.random() * 900000 + 100000);
            const am = Math.floor(Math.random() * 9000 + 1000);
            grid.innerHTML += `
                <div class="card">
                    <div class="card-header">${p}</div>
                    <div class="card-body" id="text-${i}">
                        <div class="row-data"><span>BBFS</span><span class="val-bbfs">${bbfs}</span></div>
                        <div class="row-data"><span>AM</span><span>${am}</span></div>
                        <div class="row-data"><span>SHIO</span><span>${dataShio[i % 12]}</span></div>
                        <button class="btn-copy" onclick="copyText('text-${i}', '${p}')">SALIN PREDIKSI</button>
                    </div>
                </div>`;
        });
    }

    function copyText(id, pasaran) {
        const text = document.getElementById(id).innerText.replace('SALIN PREDIKSI', '');
        navigator.clipboard.writeText(`PREDIKSI ${pasaran}\n${text}\nUTAMAKAN PREDIKSI SENDIRI`);
        alert('Prediksi ' + pasaran + ' Berhasil di Copy!');
    }

    // 4. FITUR JADWAL BANK (DENGAN LOGO LENGKAP)
    function loadJadwalBank() {
        resetActive();
        document.getElementById('m-bank').classList.add('active-menu');
        document.getElementById('main-grid').innerHTML = `<div class="bank-container" id="b-cont"></div>`;
        const cont = document.getElementById('b-cont');
        daftarBank.forEach(b => {
            cont.innerHTML += `
                <div class="bank-card">
                    <div class="logo-wrapper"><img src="${b.logo}" class="bank-logo"></div>
                    <div class="status-online">● ONLINE</div>
                    <div style="font-size:11px; color:#aaa; margin-top:5px;">${b.schedule}</div>
                </div>`;
        });
    }

    // 5. FITUR KALKULATOR SGP
    function loadSgpToto() {
        resetActive();
        document.getElementById('m-sgp').classList.add('active-menu');
        document.getElementById('main-grid').innerHTML = `
            <div class="toto-container">
                <h3 style="text-align:center; color:#00d4ff;">KALKULATOR SGP TOTO</h3>
                <div class="toto-grid">
                    <input type="number" id="b1" placeholder="B1"><input type="number" id="b2" placeholder="B2">
                    <input type="number" id="b3" placeholder="B3"><input type="number" id="b4" placeholder="B4">
                    <input type="number" id="b5" placeholder="B5"><input type="number" id="b6" placeholder="B6">
                </div>
                <input type="number" id="add" placeholder="Additional Number" style="width:100%; margin-top:10px; padding:12px; background:#000; color:#fff; border:1px solid #333; text-align:center;">
                <button class="btn-hitung" onclick="hitungSgp()">HITUNG RESULT</button>
                <div id="res-sgp" style="margin-top:20px; font-size:40px; text-align:center; font-weight:bold; color:#ffeb3b;">----</div>
            </div>`;
    }

    function hitungSgp() {
        const total = Number(document.getElementById('b1').value) + Number(document.getElementById('b2').value) + Number(document.getElementById('b3').value) + Number(document.getElementById('b4').value) + Number(document.getElementById('b5').value) + Number(document.getElementById('b6').value);
        const add = Number(document.getElementById('add').value);
        if(!total) return alert('Isi Bola!');
        const depan = ((total * 76) + add + 5).toString().substring(0,2);
        const belakang = ((total * 2) - (Number(document.getElementById('b1').value) + Number(document.getElementById('b6').value)) + add) % 100;
        document.getElementById('res-sgp').innerText = depan + belakang.toString().padStart(2, '0');
    }

    // 6. FITUR SYAIR GENERATOR (OTOMATIS GAMBAR)
    function loadSyairGenerator() {
        resetActive();
        document.getElementById('m-syair').classList.add('active-menu');
        document.getElementById('main-grid').innerHTML = `
            <div style="text-align:center; width:100%;">
                <canvas id="canvasSyair" width="700" height="850"></canvas>
                <br><button class="btn-hitung" style="max-width:300px; background:#22c55e; color:#fff;" onclick="downloadSyair()">📥 DOWNLOAD SYAIR</button>
            </div>`;
        renderSyair();
    }

    function renderSyair() {
        const ctx = document.getElementById('canvasSyair').getContext('2d');
        const bg = new Image(); bg.crossOrigin = "anonymous";
        bg.src = "https://lh3.googleusercontent.com/d/1FNenJC9_cf3s9XtUV48pHte24AgzNEeb"; 
        bg.onload = function() {
            ctx.drawImage(bg, 0, 0, 700, 850);
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(40, 40, 620, 770);
            ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 5; ctx.strokeRect(40, 40, 620, 770);
            
            ctx.fillStyle = "#00d4ff"; ctx.font = "bold 45px Arial"; ctx.textAlign = "center";
            ctx.fillText("SYAIR DANATOTO", 350, 110);
            
            const tgl = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            ctx.fillStyle = "#fff"; ctx.font = "25px Arial"; ctx.fillText(tgl, 350, 160);

            ctx.fillStyle = "#ffeb3b"; ctx.font = "bold 60px Courier New";
            ctx.fillText("SHIO: " + dataShio[new Date().getDate() % 12], 350, 250);
            
            ctx.fillStyle = "#fff"; ctx.font = "italic 22px Arial";
            ctx.fillText("Pasang angka janganlah ragu,", 350, 350);
            ctx.fillText("Jackpot besar sudah menunggu.", 350, 390);

            ctx.strokeStyle = "#fff"; ctx.strokeRect(100, 450, 500, 250);
            ctx.fillStyle = "#ffeb3b"; ctx.font = "bold 40px Courier New";
            ctx.fillText("BBFS : " + Math.floor(Math.random()*900000), 350, 520);
            ctx.fillText("AM   : " + Math.floor(Math.random()*9000), 350, 590);
            ctx.fillText("CB   : " + Math.floor(Math.random()*9) + "/" + Math.floor(Math.random()*9), 350, 660);
        }
    }

    function downloadSyair() {
        const link = document.createElement('a');
        link.download = 'Syair-Danatoto.png';
        link.href = document.getElementById('canvasSyair').toDataURL();
        link.click();
    }

    // CHECK LOGIN
    if(sessionStorage.getItem('isLoggedIn')) {
        document.body.style.display = 'block';
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        showWelcome();
    } else {
        document.body.style.display = 'block';
    }
</script>
</body>
</html>
