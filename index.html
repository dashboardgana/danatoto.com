<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP DANATOTO SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* LOGIN PAGE */
        #login-page {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #000 url('https://w0.peakpx.com/wallpaper/598/432/wallpaper-dark-background-abstract-background-black-background-abstract-digital-art.jpg') no-repeat center center;
            background-size: cover; position: fixed; width: 100%; z-index: 9999;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; border: 1px solid #00d4ff;
            width: 90%; max-width: 400px; text-align: center; color: white;
            box-shadow: 0 0 30px #00d4ff55;
        }
        .login-card h2 { margin-bottom: 25px; letter-spacing: 3px; color: #00d4ff; }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1);
            border: 1px solid #333; border-radius: 8px; color: white; outline: none;
        }
        .login-card button {
            width: 100%; padding: 12px; margin-top: 20px; background: #00d4ff;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000;
        }

        /* DASHBOARD PAGE */
        #main-dashboard { display: none; background-color: #05070a; min-height: 100vh; color: #fff; }

        /* Sidebar */
        .sidebar { 
            width: 260px; background: #000; border-right: 1px solid #1a237e; 
            height: 100vh; position: fixed; padding: 20px; overflow-y: auto; 
        }
        .sidebar h2 { color: #00d4ff; font-size: 20px; margin-bottom: 30px; text-align: center; border-bottom: 2px solid #00d4ff; padding-bottom: 10px; }
        
        .menu-item {
            display: block; color: #aaa; padding: 12px; text-decoration: none; 
            border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .menu-item:hover { color: #fff; background: #1a237e; }
        .active-menu { color: #fff; background: #00d4ff; color: #000; font-weight: bold; }

        /* Content Area */
        .content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); min-height: 100vh; }
        .header-box { 
            width: 100%; background: #0d1117; padding: 25px; border-radius: 15px; 
            border: 1px solid #30363d; margin-bottom: 30px; text-align: center;
            position: relative;
        }

        .btn-copy-all {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            padding: 10px 15px; background: #ff5252; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold; display: none;
        }
        .btn-copy-all:hover { background: #ff1744; }

        /* Grid Utama */
        #main-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; 
        }

        /* Card Style */
        .card { 
            background: #161b22; border-radius: 15px; border: 1px solid #30363d;
            overflow: hidden; transition: 0.3s; display: flex; flex-direction: column;
        }
        .card:hover { border-color: #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .card-header { 
            background: #00d4ff; padding: 12px; font-weight: bold; color: #000; 
            text-align: center; text-transform: uppercase; font-size: 14px;
        }
        
        /* Card Body Content */
        .card-body { padding: 15px; flex-grow: 1; font-size: 13px; color: #f0f6fc; line-height: 1.6; }
        .data-text { display: block; margin-bottom: 2px; }
        
        .ups-text {
            color: #ff5252; font-size: 11px; font-weight: bold; text-align: center;
            margin-top: 15px; border-top: 1px solid #30363d; padding-top: 10px;
        }

        .btn-copy {
            width: 100%; margin-top: 10px; padding: 10px; background: transparent; 
            border: 1px solid #00d4ff; color: #00d4ff; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-size: 11px;
        }
        .btn-copy:hover { background: #00d4ff; color: #000; }

        /* Welcome Screen */
        .welcome-msg { text-align: center; margin-top: 100px; color: #30363d; width: 100%; grid-column: 1 / -1; }
        .welcome-msg i { font-size: 80px; margin-bottom: 20px; }

        @media (max-width: 768px) { 
            .sidebar { display: none; } 
            .content { margin-left: 0; width: 100%; } 
            .btn-copy-all { position: static; transform: none; margin-top: 15px; display: block; width: 100%; }
        }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <i class="fas fa-lock fa-3x" style="color: #00d4ff; margin-bottom: 15px;"></i>
        <h2>VIP LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()">MASUK KE SISTEM</button>
        <p id="err" style="color: #ff5252; margin-top: 15px;"></p>
    </div>
</div>

<div id="main-dashboard">
    <div class="sidebar">
        <h2>VIP PANEL</h2>
        <div class="menu-item active-menu" onclick="showWelcome()"><i class="fas fa-home"></i> DASHBOARD</div>
        
        <div class="menu-item" style="background: #1a237e; color: #fff; margin-top: 20px;" onclick="loadAllPasaran()">
            <i class="fas fa-fire"></i> <b>PREDIKSI TOGEL</b>
        </div>

        <div class="menu-item"><i class="fas fa-university"></i> JADWAL BANK</div>
        <div class="menu-item"><i class="fas fa-book"></i> BUKU MIMPI</div>
        <div class="menu-item" onclick="location.reload()" style="color: #ff5252; margin-top: 50px;"><i class="fas fa-power-off"></i> LOGOUT</div>
    </div>

    <div class="content">
        <div class="header-box">
            <h1 id="date-now">--</h1>
            <p id="status-text" style="color: #8b949e; font-size: 12px; margin-top: 5px;">SILAKAN PILIH MENU UNTUK MEMULAI</p>
            <button id="btn-master" class="btn-copy-all" onclick="copyAllPrediksi()"><i class="fas fa-copy"></i> COPY ALL PREDIKSI</button>
        </div>

        <div id="main-grid">
            <div class="welcome-msg">
                <i class="fas fa-dice"></i>
                <h2>SELAMAT DATANG DI PANEL VIP</h2>
                <p>Klik menu <b>PREDIKSI TOGEL</b> di samping untuk melihat semua pasaran.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const pasarans = ["HOKI DRAW", "TOTO MACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "BANGKOK 0130", "NEWYORK MIDDAY", "CAROLINA DAY", "BRUNEI 02", "OREGON 03", "OREGON 06", "CALIFORNIA", "FLORIDA EVENING", "OREGON 09", "BANGKOK 0930", "NEWYORK EVENING", "KENTUCKY EVENING", "CAROLINA EVENING", "TOTOCAMBODIA", "CHELSEA 11", "OREGON 12", "POIPET12", "BULLSEYE", "TOTOMACAU SIANG", "SYDNEY", "JAKARTA 1400", "BRUNEI 14", "CHELSEA 15", "TOTOMALI 1530", "TOTOMACAU 5D SORE", "POIPET15", "TOTOMACAU SORE", "HUAHIN 1630", "KING KONG 4D I", "SINGAPORE", "MAGNUM4D", "TOTOMACAU MALAM I", "CHELSEA 19", "POIPET19", "PCSO", "TOTOMALI 2030", "HUAHIN 2100", "CHELSEA 21", "TOTOMACAU 5D MALAM", "NEVADA", "BRUNEI 21", "TOTOMACAU MALAM II", "POIPET22", "HONGKONG", "TOTOMACAU MALAM III", "TOTOMALI 2330", "JAKARTA 2330", "KING KONG 4D II"];
    const shios = ["ULAR", "BABI", "KELINCI", "KERBAU", "HARIMAU", "AYAM", "ANJING", "MONYET", "NAGA", "TIKUS", "KAMBING", "KUDA"];
    
    let masterData = [];

    function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        } else {
            document.getElementById('err').innerText = "USERNAME/PASSWORD SALAH!";
        }
    }

    function showWelcome() {
        document.getElementById('btn-master').style.display = 'none';
        document.getElementById('status-text').innerText = "SILAKAN PILIH MENU UNTUK MEMULAI";
        document.getElementById('main-grid').innerHTML = `<div class="welcome-msg"><i class="fas fa-dice"></i><h2>SELAMAT DATANG DI PANEL VIP</h2><p>Klik menu <b>PREDIKSI TOGEL</b> di samping untuk melihat semua pasaran.</p></div>`;
    }

    function loadAllPasaran() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        masterData = [];
        document.getElementById('status-text').innerText = "MENAMPILKAN SEMUA PASARAN PREDIKSI";
        document.getElementById('btn-master').style.display = 'block';
        
        const tglHeader = document.getElementById('date-now').innerText;
        const d = new Date();
        const seedDay = d.getFullYear() + d.getMonth() + d.getDate();

        pasarans.forEach((name, i) => {
            const seed = seedDay + i;
            
            // Logika generate angka unik tiap pasaran
            const bbfs = Array.from({length: 7}, (_, k) => Math.floor(Math.abs(Math.sin(seed + k) * 10)) % 10).join('');
            const am = Array.from({length: 5}, (_, k) => Math.floor(Math.abs(Math.cos(seed + k) * 10)) % 10).join('');
            const b = bbfs.split('');
            const p4d = `${b[0]}${b[2]}${b[4]}${b[6]} ${b[1]}${b[3]}${b[5]}${b[0]} ${b[2]}${b[1]}${b[6]}${b[3]} ${b[4]}${b[5]}${b[0]}${b[1]} ${b[6]}${b[4]}${b[3]}${b[2]}`;
            const p2d = `${b[0]}${b[1]} ${b[2]}${b[3]} ${b[4]}${b[5]} ${b[6]}${b[0]} ${b[1]}${b[4]} ${b[2]}${b[5]} ${b[3]}${b[6]} ${b[0]}${b[3]} ${b[4]}${b[1]} ${b[5]}${b[2]}`;
            const cb1 = Math.floor(Math.abs(Math.sin(seed + 8) * 10)) % 10;
            const cb2 = Math.floor(Math.abs(Math.cos(seed + 9) * 10)) % 10;
            const twin = `${b[0]}${b[0]} / ${b[1]}${b[1]} / ${b[2]}${b[2]}`;
            const shioUtama = shios[seed % shios.length];
            const shioLengkap = `${shioUtama} / ${shios[(seed+1)%12]} / ${shios[(seed+2)%12]}`;

            // Simpan data untuk fungsi copy
            masterData.push({ name, tgl: tglHeader, bbfs, am, p4d, p2d, cb1, cb2, twin, shioLengkap });

            grid.innerHTML += `
                <div class="card">
                    <div class="card-header">${name}</div>
                    <div class="card-body">
                        <span class="data-text">${tglHeader}</span>
                        <span class="data-text">BBFS ${bbfs}</span>
                        <span class="data-text">ANGKA MAIN ${am}</span>
                        <span class="data-text">4D ${p4d}</span>
                        <span class="data-text">2D (BB) ${p2d}</span>
                        <span class="data-text">COLOK BEBAS ${cb1} / ${cb2}</span>
                        <span class="data-text">COLOK BEBAS 2D ${cb1}${b[0]} / ${cb2}${b[1]} / ${b[2]}${b[3]}</span>
                        <span class="data-text">TWIN ${twin}</span>
                        <span class="data-text">SHIO ${shioLengkap}</span>
                        <div class="ups-text">SELALU UTAMAKAN PREDIKSI SENDIRI</div>
                        <button class="btn-copy" onclick="copyAction(${i})">SALIN PREDIKSI</button>
                    </div>
                </div>`;
        });
    }

    function copyAction(index) {
        const d = masterData[index];
        const teks = `PREDIKSI ${d.name}\n${d.tgl}\nBBFS ${d.bbfs}\nANGKA MAIN ${d.am}\n4D ${d.p4d}\n2D (BB) ${d.p2d}\nCOLOK BEBAS ${d.cb1} / ${d.cb2}\nCOLOK BEBAS 2D ${d.cb1}${d.bbfs[0]} / ${d.cb2}${d.bbfs[1]} / ${d.bbfs[2]}${d.bbfs[3]}\nTWIN ${d.twin}\nSHIO ${d.shioLengkap}\nSELALU UTAMAKAN PREDIKSI SENDIRI`;
        
        navigator.clipboard.writeText(teks).then(() => {
            alert("BERHASIL DI COPY!\n\n" + d.name);
        });
    }

    function copyAllPrediksi() {
        if(masterData.length === 0) return;
        const semuaTeks = masterData.map(d => {
            return `PREDIKSI ${d.name}\n${d.tgl}\nBBFS ${d.bbfs}\nANGKA MAIN ${d.am}\n4D ${d.p4d}\n2D (BB) ${d.p2d}\nCOLOK BEBAS ${d.cb1} / ${d.cb2}\nCOLOK BEBAS 2D ${d.cb1}${d.bbfs[0]} / ${d.cb2}${d.bbfs[1]} / ${d.bbfs[2]}${d.bbfs[3]}\nTWIN ${d.twin}\nSHIO ${d.shioLengkap}\nSELALU UTAMAKAN PREDIKSI SENDIRI`;
        }).join('\n\n====================\n\n');
        
        navigator.clipboard.writeText(semuaTeks).then(() => {
            alert("SEMUA PREDIKSI BERHASIL DI COPY!");
        });
    }
</script>
</body>
</html>
