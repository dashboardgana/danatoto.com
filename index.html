<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Dashboard Prediksi Togel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* --- BACKGROUND HALAMAN LOGIN (BEDA DENGAN DALAM) --- */
        #login-page {
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e); /* Nanti bisa ganti dengan gambar */
            background-size: cover;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%; max-width: 380px; text-align: center;
            color: white;
        }

        .login-card h2 { margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255,255,255,0.1); border: 1px solid #444;
            border-radius: 8px; color: white; outline: none;
        }
        .login-card button {
            width: 100%; padding: 12px; margin-top: 20px;
            background: #00d4ff; border: none; border-radius: 8px;
            color: black; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .login-card button:hover { background: #fff; box-shadow: 0 0 20px #00d4ff; }

        /* --- BACKGROUND HALAMAN DALAM --- */
        #main-dashboard { 
            display: none; 
            background-color: #0b0e14; /* Background halaman dalam hitam pekat */
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar { 
            width: 250px; background: #000; border-right: 2px solid #1a237e; 
            height: 100vh; position: fixed; padding: 20px; overflow-y: auto; 
        }
        .sidebar h2 { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; text-align: center; margin-bottom: 30px; }
        .sidebar a { 
            display: block; color: #888; padding: 12px; text-decoration: none; 
            border-radius: 8px; margin-bottom: 8px; transition: 0.3s; 
        }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: #1a237e; box-shadow: 0 0 10px #1a237e; }

        /* Content Area */
        .content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); }
        .header-box { 
            background: #161b22; padding: 25px; border-radius: 15px; 
            border: 1px solid #30363d; margin-bottom: 30px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        /* Grid Prediksi */
        .prediction-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; 
        }

        .card { 
            background: #1c2128; border-radius: 15px; border: 2px solid #30363d;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .card:hover { 
            border-color: #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); 
            transform: translateY(-5px);
        }

        .card-header { 
            background: #2d333b; padding: 15px; font-weight: bold; color: #00d4ff; 
            text-align: center; border-bottom: 1px solid #444;
            animation: neonBlink 2s infinite;
        }

        @keyframes neonBlink {
            0%, 100% { text-shadow: 0 0 5px #00d4ff; }
            50% { text-shadow: 0 0 15px #00d4ff, 0 0 25px #00d4ff; }
        }

        .card-body { padding: 20px; }
        .row-data { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .label { color: #888; font-size: 12px; }
        .val { color: #fff; font-weight: bold; }
        .val-bbfs { color: #ffeb3b; text-shadow: 0 0 5px rgba(255,235,59,0.3); }

        .btn-copy {
            width: 100%; margin-top: 15px; padding: 10px;
            background: transparent; border: 1px solid #00d4ff;
            color: #00d4ff; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-copy:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content { margin-left: 0; width: 100%; padding: 15px; }
        }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x" style="color: #00d4ff; margin-bottom: 15px;"></i>
        <h2>VIP LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="doLogin()">MASUK DASHBOARD</button>
        <p id="err" style="color: #ff5252; margin-top: 15px; font-size: 13px;"></p>
    </div>
</div>

<div id="main-dashboard">
    <div class="sidebar">
        <h2>VIP PANEL</h2>
        <a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#"><i class="fas fa-university"></i> Jadwal Bank</a>
        <a href="#"><i class="fas fa-calculator"></i> Hitung SGP</a>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="side-list" style="font-size: 11px;"></div>
        <a href="#" onclick="location.reload()" style="color: #ff5252; margin-top: 30px;"><i class="fas fa-power-off"></i> Logout</a>
    </div>

    <div class="content">
        <div class="header-box">
            <h1 id="date-text">--</h1>
            <p style="color: #00d4ff; letter-spacing: 2px;">PREDIKSI OTOMATIS BERDASARKAN RUMUS HARIAN</p>
        </div>
        <div class="prediction-grid" id="main-grid"></div>
    </div>
</div>

<script>
    // DATA LOGIN
    function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
            initDashboard();
        } else {
            document.getElementById('err').innerText = "Akses Ditolak! Cek Username/Password.";
        }
    }

    const pasarans = [
        "TOTO MACAU PAGI", "KENTUCKY MIDDAY", "FLORIDA MIDDAY", "HUAHIN 0100", "BANGKOK 0130", 
        "NEW YORK MIDDAY", "CAROLINA DAY", "BRUNEI 02", "OREGON 03", "OREGON 06", 
        "CALIFORNIA", "FLORIDA EVENING", "OREGON 09", "BANGKOK 0930", "NEW YORK EVENING", 
        "KENTUCKY EVENING", "CAROLINA EVENING", "TOTO CAMBODIA", "CHELSEA 11", "OREGON 12", 
        "POIPET 12", "TOTO MACAU SIANG", "BULLSEYE", "SYDNEY", "JAKARTA 1400", 
        "BRUNEI 14", "CHELSEA 15", "TOTO MACAU 5D SORE", "POIPET 15", "TOTO MALI 1530", 
        "TOTO MACAU SORE", "HUAHIN 1630", "SINGAPORE", "MAGNUM", "TOTO MACAU MALAM I", 
        "CHELSEA 19", "POIPET 19", "PCSO", "TOTO MALI 2030", "HUAHIN 2100", 
        "CHELSEA 21", "TOTO MACAU 5D MALAM", "NEVADA", "BRUNEI 21", "TOTO MACAU MALAM II", 
        "POIPET 22", "HONGKONG", "TOTO MACAU MALAM III", "TOTO MALI 2330", "JAKARTA 2330", 
        "KING KONG 4D", "HOKIDRAW"
    ];

    const shios = ["ULAR", "BABI", "KELINCI", "KERBAU", "HARIMAU", "AYAM", "ANJING", "MONYET", "NAGA", "TIKUS", "KAMBING", "KUDA"];

    function initDashboard() {
        const d = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date-text').innerText = d.toLocaleDateString('id-ID', options);
        
        const grid = document.getElementById('main-grid');
        const side = document.getElementById('side-list');
        const seedDay = d.getFullYear() + d.getMonth() + d.getDate();

        pasarans.forEach((name, i) => {
            const seed = seedDay + i;
            const bbfs = Array.from({length: 7}, (_, k) => Math.floor(Math.abs(Math.sin(seed + k) * 10)) % 10).join('');
            const am = Array.from({length: 5}, (_, k) => Math.floor(Math.abs(Math.cos(seed + k) * 10)) % 10).join('');
            const cb = (seed % 10) + " / " + ((seed + 3) % 10);
            const shio = shios[seed % shios.length];

            const textCopy = `PREDIKSI ${name}\nTanggal: ${d.toLocaleDateString('id-ID')}\nBBFS: ${bbfs}\nAM: ${am}\nCB: ${cb}\nSHIO: ${shio}\nUPS!`;

            grid.innerHTML += `
                <div class="card">
                    <div class="card-header">${name}</div>
                    <div class="card-body">
                        <div class="row-data"><span class="label">BBFS</span><span class="val val-bbfs">${bbfs}</span></div>
                        <div class="row-data"><span class="label">ANGKA MAIN</span><span class="val">${am}</span></div>
                        <div class="row-data"><span class="label">COLOK BEBAS</span><span class="val">${cb}</span></div>
                        <div class="row-data"><span class="label">SHIO</span><span class="val">${shio}</span></div>
                        <button class="btn-copy" onclick="copyMe('${textCopy}')"><i class="far fa-copy"></i> SALIN PREDIKSI</button>
                    </div>
                </div>
            `;
            side.innerHTML += `<a href="#" style="padding:5px 10px;">${name}</a>`;
        });
    }

    function copyMe(txt) {
        navigator.clipboard.writeText(txt).then(() => {
            alert("Prediksi disalin!");
        });
    }
</script>
</body>
</html>
